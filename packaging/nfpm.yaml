# nfpm package configuration — https://nfpm.goreleaser.com/configuration/
#
# Required env vars (set in CI before running nfpm):
#   VERSION           — version without "v"  e.g. 0.2.1
#   ARCH              — nfpm arch string: amd64 | arm64
#   GOARCH            — Go arch string:   amd64 | arm64
#   GITHUB_REPOSITORY — owner/repo e.g. gauravbhindwar/filetrans

name: "filetrans"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
maintainer: "Gaurav Bhindwar <bhindwargaurav@gmail.com>"
description: |
  Direct file transfer over USB-C cable or LAN. No cloud. No Wi-Fi required.
  Powered by GauravTransfer Protocol (GTP/1.0) — a custom binary transport
  with windowed chunk pipeline, mDNS peer discovery, and transfer resume.
homepage: "https://github.com/${GITHUB_REPOSITORY}"
license: "GPL-3.0"
section: "utils"
priority: "optional"

contents:
  - src: "../dist/filetrans_linux_pkg"
    dst: "/usr/bin/filetrans"
    file_info:
      mode: 0755

  - src: "../dist/filetrans-gui_linux_pkg"
    dst: "/usr/bin/filetrans-gui"
    file_info:
      mode: 0755

  - src: "../scripts/linux/setup_gadget.sh"
    dst: "/usr/share/filetrans/setup_gadget.sh"
    file_info:
      mode: 0755

  - src: "../LICENSE"
    dst: "/usr/share/doc/filetrans/copyright"

  - src: "../README.md"
    dst: "/usr/share/doc/filetrans/README.md"

rpm:
  group: Applications/System
  compression: gzip
  summary: "Direct file transfer — USB-C, LAN, GTP protocol"

deb:
  fields:
    Bugs: "https://github.com/${GITHUB_REPOSITORY}/issues"

archlinux:
  packager: "Gaurav Bhindwar <noreply@github.com>"
