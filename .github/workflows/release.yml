name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  GO_VERSION: '1.22'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: cross-compile all binaries
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag:     ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"         >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -timeout 60s

      - name: Build all targets
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"

          build() {
            local goos=$1 goarch=$2 ext=$3
            echo "  building filetrans_${goos}_${goarch}${ext} ..."
            GOOS=$goos GOARCH=$goarch \
              go build -trimpath -ldflags="$LDFLAGS" \
              -o "dist/filetrans_${goos}_${goarch}${ext}" ./cmd/filetrans
            GOOS=$goos GOARCH=$goarch \
              go build -trimpath -ldflags="$LDFLAGS" \
              -o "dist/filetrans-gui_${goos}_${goarch}${ext}" ./cmd/filetrans-gui
          }

          build linux   amd64 ""
          build linux   arm64 ""
          build linux   arm   ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          build darwin  amd64 ""
          build darwin  arm64 ""

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Linux packages
# ─────────────────────────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux (${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Make binaries executable
        run: chmod +x dist/filetrans_linux_${{ matrix.goarch }} dist/filetrans-gui_linux_${{ matrix.goarch }} || true

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm
          nfpm --version

      - name: Set env
        run: |
          echo "VERSION=${{ needs.build.outputs.version }}" >> "$GITHUB_ENV"
          echo "ARCH=${{ matrix.arch }}"                    >> "$GITHUB_ENV"
          echo "GOARCH=${{ matrix.goarch }}"                >> "$GITHUB_ENV"

      - name: Stage binaries for nfpm
        run: |
          cp dist/filetrans_linux_${{ matrix.goarch }}     dist/filetrans_linux_pkg
          cp dist/filetrans-gui_linux_${{ matrix.goarch }} dist/filetrans-gui_linux_pkg
          chmod +x dist/filetrans_linux_pkg dist/filetrans-gui_linux_pkg

      - name: Build .deb
        run: cd packaging && nfpm package --config nfpm.yaml --packager deb --target ../dist/

      - name: Build .rpm
        run: cd packaging && nfpm package --config nfpm.yaml --packager rpm --target ../dist/

      - name: Build Arch (.pkg.tar.zst)
        run: cd packaging && nfpm package --config nfpm.yaml --packager archlinux --target ../dist/

      - name: Build AppImage (amd64 only)
        if: matrix.arch == 'amd64'
        continue-on-error: true
        run: |
          sudo apt-get install -y libfuse2 imagemagick fonts-dejavu-core --no-install-recommends

          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications
          cp dist/filetrans_linux_amd64 AppDir/usr/bin/filetrans
          cp packaging/appimage/AppRun AppDir/AppRun
          cp packaging/appimage/filetrans.desktop AppDir/filetrans.desktop
          cp packaging/appimage/filetrans.desktop AppDir/usr/share/applications/
          chmod +x AppDir/AppRun AppDir/usr/bin/filetrans

          convert -size 256x256 xc:#6c63ff \
            -fill white -font DejaVu-Sans -pointsize 72 \
            -gravity center -annotate 0 "ft" \
            AppDir/filetrans.png 2>/dev/null || \
          convert -size 256x256 xc:#6c63ff AppDir/filetrans.png

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            AppDir "dist/filetrans_linux_amd64.AppImage"

      - name: Build tarball
        run: |
          tar -czf "dist/filetrans_linux_${{ matrix.arch }}.tar.gz" \
            -C dist \
            "filetrans_linux_${{ matrix.goarch }}" \
            "filetrans-gui_linux_${{ matrix.goarch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.zst
            dist/*.AppImage
            dist/*.tar.gz
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: macOS packages
# ─────────────────────────────────────────────────────────────────────────────
  package-macos:
    name: Package macOS (${{ matrix.arch }})
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Build macOS packages
        run: |
          chmod +x dist/filetrans_darwin_${{ matrix.arch }}
          chmod +x scripts/package-macos.sh
          bash scripts/package-macos.sh \
            "${{ needs.build.outputs.version }}" \
            "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: packages-macos-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.pkg
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Checksums + GitHub Release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build, package-linux, package-macos]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## filetrans ${{ needs.build.outputs.version }}

            Direct file transfer over USB-C cable (or LAN fallback). No cloud. No Wi-Fi required.
            License: GPL-3.0

            ### Quick install

            **Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            **Arch Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-arch.sh | bash
            ```

            **Windows:** Download `.exe` below and run from PowerShell.

            **macOS:** Download `.dmg` or `.pkg` below.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `filetrans_linux_amd64` | Linux x86-64 CLI |
            | `filetrans-gui_linux_amd64` | Linux x86-64 GUI |
            | `filetrans_linux_arm64` | Linux ARM64 CLI |
            | `filetrans_linux_arm` | Linux ARMv7 (Pi) CLI |
            | `filetrans_linux_amd64.AppImage` | Linux x86-64 AppImage |
            | `filetrans_linux_amd64.tar.gz` | Linux x86-64 tarball |
            | `filetrans_linux_arm64.tar.gz` | Linux ARM64 tarball |
            | `*.amd64.deb` | Debian / Ubuntu |
            | `*.x86_64.rpm` | Fedora / RHEL |
            | `*.pkg.tar.zst` | Arch Linux |
            | `filetrans_windows_amd64.exe` | Windows x64 CLI |
            | `filetrans-gui_windows_amd64.exe` | Windows x64 GUI |
            | `filetrans_windows_arm64.exe` | Windows ARM64 CLI |
            | `filetrans_darwin_amd64` | macOS Intel CLI |
            | `filetrans_darwin_arm64` | macOS Apple Silicon CLI |
            | `*_darwin_amd64_*.dmg` | macOS Intel DMG |
            | `*_darwin_arm64_*.dmg` | macOS Apple Silicon DMG |

            Verify with `checksums.txt` (SHA-256).
