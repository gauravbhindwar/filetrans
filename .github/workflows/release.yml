name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -timeout 60s

      - name: Build all targets
        run: |
          mkdir -p dist

          GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/filetrans_windows_amd64.exe ./cmd/filetrans

          GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/filetrans_linux_amd64 ./cmd/filetrans

          GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/filetrans_linux_arm64 ./cmd/filetrans

          GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/filetrans_darwin_amd64 ./cmd/filetrans

          GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/filetrans_darwin_arm64 ./cmd/filetrans

      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/filetrans_windows_amd64.exe
            dist/filetrans_linux_amd64
            dist/filetrans_linux_arm64
            dist/filetrans_darwin_amd64
            dist/filetrans_darwin_arm64
            dist/checksums.txt
          body: |
            ## filetrans ${{ github.ref_name }}

            Direct file transfer over USB-C cable between Windows and Linux laptops.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `filetrans_windows_amd64.exe` | Windows 10/11 x64 |
            | `filetrans_linux_amd64` | Linux x86-64 |
            | `filetrans_linux_arm64` | Linux ARM64 |
            | `filetrans_darwin_amd64` | macOS Intel |
            | `filetrans_darwin_arm64` | macOS Apple Silicon |

            Verify downloads with `checksums.txt` (SHA-256).

            ### Quick start

            ```bash
            # Linux (sender) — run setup_gadget.sh first as root
            chmod +x filetrans_linux_amd64
            sudo ./filetrans_linux_amd64 --role=sender myfile.zip

            # Windows (receiver)
            .\filetrans_windows_amd64.exe --role=receiver
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full documentation.
